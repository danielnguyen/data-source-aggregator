source_id: jeep_wj_maintenance
display_name: Jeep WJ Maintenance Log
connector: google_sheets
enabled: true

description: Maintenance records for the Jeep WJ.

domain_tags:
  - vehicle
  - maintenance
  - jeep_wj

sensitivity: low
access_mode: read_only

connector_config:
  spreadsheet_id: "replace-with-google-sheet-id"
  worksheet: Maintenance
  header_row: 1
  credentials_ref: google_sheets_readonly

retrieval:
  default_mode: targeted
  max_results: 20
  max_bytes: 100000
  max_text_chars: 40000
  max_context_rows: 250
  allow_full_fetch: true

result_text:
  title_from: Task
  include_fields:
    - Date
    - Odometer
    - Category
    - Task
    - Parts
    - Cost
    - Shop
    - Notes
